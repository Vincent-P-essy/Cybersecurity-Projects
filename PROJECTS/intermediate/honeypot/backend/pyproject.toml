[project]
name = "canaris"
version = "0.1.0"
description = "Multi-service honeypot with real-time threat dashboard"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "asyncpg>=0.30.0",
    "sqlalchemy[asyncio]>=2.0.36",
    "pydantic-settings>=2.6.0",
    "asyncssh>=2.18.0",
    "aiohttp>=3.11.0",
    "httpx>=0.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
